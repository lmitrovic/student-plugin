name: Deploy Plugin

on:
  workflow_run:
    workflows: ["Bump Plugin Version"]
    types:
      - completed

jobs:
  deploy:
    # Pokreće se samo ako je Bump workflow uspešno završen
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      PRODUCTION_SERVER_USERNAME: ${{ secrets.PRODUCTION_SERVER_USERNAME }}
      PRODUCTION_SERVER_PASSWORD: ${{ secrets.PRODUCTION_SERVER_PASSWORD }}
      PRODUCTION_SERVER_HOST: ${{ secrets.PRODUCTION_SERVER_HOST }}
      REMOTE_TARGET: "/var/www/intellij-plugins/"

    steps:
      # 1. Povlačenje najnovijeg koda (sa Bump commit-om)
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0



      # 3. Build (sada će Gradle videti novu verziju u gradle.properties)
      - name: Build plugin
        working-directory: IntelliJ-Plugin  # DODAJ OVO
        run: ./gradlew buildPlugin

      # 4. Slanje ZIP fajla na server
      - name: Copy build to server
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ env.PRODUCTION_SERVER_HOST }}
          username: ${{ env.PRODUCTION_SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Prilagođena putanja zbog podfoldera
          source: "IntelliJ-Plugin/build/distributions/*.zip"
          target: "/var/www/intellij-plugins/build/distributions/"
          strip_components: 3
          overwrite: true

      # 5. Ažuriranje updatePlugins.xml uz čuvanje istorije
      - name: Update updatePluginsStudent.xml
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_SERVER_HOST }}
          username: ${{ secrets.PRODUCTION_SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            BASE_DIR="/var/www/intellij-plugins"
            DIST_DIR="$BASE_DIR/build/distributions"
            # PAŽNJA: Promenjena putanja na tvoj XML za studente
            XML_PATH="$BASE_DIR/updatePluginsStudent.xml"
          
          # Tražimo najnoviji STUDENT-TESTING zip
            LATEST_ZIP=$(ls -v $DIST_DIR/Student-testing-IntelliJ-plugin-*.zip 2>/dev/null | tail -n 1)
          
            if [ -z "$LATEST_ZIP" ]; then
              echo "GRESKA: Nije pronađen nijedan studentski ZIP u $DIST_DIR"
              exit 1
           fi
          
            FILENAME=$(basename "$LATEST_ZIP")
            # Izvlačenje verzije iz imena (Student-testing-IntelliJ-plugin-0.0.7.zip -> 0.0.7)
            VERSION=$(echo "$FILENAME" | sed -E 's/Student-testing-IntelliJ-plugin-(.*)\.zip/\1/')
            PLUGIN_URL="http://157.180.37.247/build/distributions/$FILENAME"
          
            echo "Ažuriram XML za verziju: $VERSION"
          
            if [ -f "$XML_PATH" ] && grep -q "version=\"$VERSION\"" "$XML_PATH"; then
              echo "Verzija $VERSION je već u XML-u."
              exit 0
            fi
          
          # Dodavanje novog taga sa ispravnim ID-jem (com.raf.studentski)
            xmlstarlet ed -L \
              --subnode "/plugins" --type elem -n "plugin" -v "" \
              --var "L" "/plugins/plugin[last()]" \
              --insert "\$L" --type attr -n "id" -v "com.raf.studentski" \
              --insert "\$L" --type attr -n "url" -v "$PLUGIN_URL" \
              --insert "\$L" --type attr -n "version" -v "$VERSION" \
              --subnode "\$L" --type elem -n "name" -v "Studentski Plugin - RAF" \
              --subnode "\$L" --type elem -n "description" -v "Plugin za studente u IntelliJ-u" \
              --subnode "\$L" --type elem -n "idea-version" \
              --insert "\$L/idea-version" --type attr -n "since-build" -v "241.0" \
              --insert "\$L/idea-version" --type attr -n "until-build" -v "999.*" \
              --subnode "\$L" --type elem -n "vendor" \
              --insert "\$L/vendor" --type attr -n "email" -v "zarkoned@outlook.com" \
              --insert "\$L/vendor" --type attr -n "url" -v "https://raf.edu.rs" \
              --subnode "\$L" --type elem -n "icon" \
              --insert "\$L/icon" --type attr -n "url" -v "http://157.180.37.247/pluginIcon.svg" \
              "$XML_PATH"